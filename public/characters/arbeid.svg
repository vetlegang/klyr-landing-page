<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 900 900" width="900" height="900"
     xmlns="http://www.w3.org/2000/svg"
     style="background:transparent">
  <g stroke-linecap="round" stroke-linejoin="round">

  <!-- ══ HEAD (LOCKED — identical for all 6) ══ -->
  <!-- skull -->
  <ellipse cx="450" cy="200" rx="90" ry="95"
    stroke="#2A5C18" stroke-width="2.8" fill="none"/>

  <!-- hair tufts -->
  <path d="M390 122 Q397 107 406 118"
    stroke="#2A5C18" stroke-width="2.8" stroke-linecap="round" fill="none"/>
  <path d="M420 112 Q429  97 440 108"
    stroke="#2A5C18" stroke-width="2.8" stroke-linecap="round" fill="none"/>
  <path d="M457 110 Q467  96 476 108"
    stroke="#2A5C18" stroke-width="2.8" stroke-linecap="round" fill="none"/>

  <!-- eyes — y=215 -->
  <circle cx="410" cy="215" r="7"  fill="#2A5C18"/>
  <circle cx="490" cy="215" r="7"  fill="#2A5C18"/>

  <!-- smile -->
  <path d="M415 262 Q450 285 485 262"
    stroke="#2A5C18" stroke-width="2.2" stroke-linecap="round" fill="none"/>

  <!-- neck -->
  <line x1="432" y1="294" x2="430" y2="345"
    stroke="#2A5C18" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="468" y1="294" x2="470" y2="345"
    stroke="#2A5C18" stroke-width="2.8" stroke-linecap="round"/>


  <!-- jacket body -->
  <path d="M360 355 Q355 360 365 590
           Q450 600 535 590
           Q545 360 540 355 Z"
    stroke="#2A5C18" stroke-width="2.8" stroke-linejoin="round" fill="none"/>
  <!-- collar V -->
  <path d="M432 355 L450 385 L468 355"
    stroke="#2A5C18" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- centre button line -->
  <line x1="450" y1="393" x2="450" y2="580"
    stroke="#2A5C18" stroke-width="1" opacity="0.35"/>
  <circle cx="450" cy="423" r="2.5"
    stroke="#2A5C18" stroke-width="1.5" opacity="0.5" fill="none"/>
  <circle cx="450" cy="448" r="2.5"
    stroke="#2A5C18" stroke-width="1.5" opacity="0.5" fill="none"/>
  <!-- left leg -->
  <path d="M400 590 Q396 700 394 810"
    stroke="#2A5C18" stroke-width="2.8" stroke-linecap="round" fill="none"/>
  <path d="M394 810 Q390 818 378 818"
    stroke="#2A5C18" stroke-width="2.8" stroke-linecap="round" fill="none"/>
  <!-- right leg -->
  <path d="M500 590 Q504 700 506 810"
    stroke="#2A5C18" stroke-width="2.8" stroke-linecap="round" fill="none"/>
  <path d="M506 810 Q510 818 522 818"
    stroke="#2A5C18" stroke-width="2.8" stroke-linecap="round" fill="none"/>

  <!-- left arm down -->
  <path d="M360 395 Q338 435 330 480"
    stroke="#2A5C18" stroke-width="2.8" stroke-linecap="round" fill="none"/>
  <ellipse cx="330" cy="487" rx="8" ry="7"
    stroke="#2A5C18" stroke-width="2.2" fill="none"/>
  <!-- right arm: holding clapperboard -->
  <path d="M540 390 Q568 400 575 440"
    stroke="#2A5C18" stroke-width="2.8" stroke-linecap="round" fill="none"/>
  <!-- clapperboard body -->
  <rect x="575" y="430" width="72" height="55" rx="4"
    stroke="#2A5C18" stroke-width="2.8" fill="none"/>
  <!-- clapper top strip -->
  <rect x="575" y="418" width="72" height="16" rx="3"
    stroke="#2A5C18" stroke-width="2.8" fill="none"/>
  <!-- clapper diagonal lines -->
  <line x1="575" y1="418" x2="590" y2="434"
    stroke="#2A5C18" stroke-width="2" opacity="0.5"/>
  <line x1="592" y1="418" x2="607" y2="434"
    stroke="#2A5C18" stroke-width="2" opacity="0.5"/>
  <line x1="609" y1="418" x2="624" y2="434"
    stroke="#2A5C18" stroke-width="2" opacity="0.5"/>
  <!-- text lines on board -->
  <line x1="585" y1="456" x2="638" y2="456"
    stroke="#2A5C18" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="585" y1="468" x2="628" y2="468"
    stroke="#2A5C18" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <!-- lime accent dot -->
  <circle cx="640" cy="430" r="5" fill="#BEFF00"/>

  </g>
</svg>